<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>G O K U</title>
    </head>
    <body>

        <style>
  .glow {
    width: 1.8%;
    height: 3.4%;
    position: absolute;
    top: 49.3%;
    left: 54.9%;
    transform: translate(-50%, -50%);
    z-index: 2;
    border-radius: 50%;
    border: none;
    outline: none;
    background: radial-gradient(circle at 35% 35%,
      #ffffff 0%,
      #66aaff 25%,
      #0033ff 55%,
      #000080 100%
    );

    box-shadow:
      0 0 10px 4px rgba(100, 160, 255, 0.9),
      0 0 30px 10px rgba(50, 100, 255, 0.7),
      0 0 70px 25px rgba(0, 50, 255, 0.5),
      0 0 140px 50px rgba(0, 0, 200, 0.3);

    animation: energyBall 1s ease-in-out infinite;
  }

  @keyframes energyBall {
    0% {
      transform: translate(-50%, -50%) scale(1);
      box-shadow:
        0 0 15px 4px rgba(100, 160, 255, 0.9),
        0 0 24px 8px rgba(87, 138, 219, 0.9),
        0 0 30px 10px rgba(50, 100, 255, 0.7),
        0 0 70px 25px rgba(0, 50, 255, 0.5),
        0 0 100px 50px rgba(0, 0, 200, 0.3);
    }
    50% {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow:
        0 0 80px 36px rgba(150, 200, 255, 1),
        0 0 54px 20px rgba(87, 138, 219, 0.9),
        0 0 70px 18px rgba(80, 140, 255, 0.85),
        0 0 180px 40px rgba(30, 79, 255, 0.511),
        0 0 520px 80px rgba(0, 0, 220, 0.35);
    }
    100% {
      transform: translate(-50%, -50%) scale(1);
      box-shadow:
        0 0 15px 4px rgba(100, 160, 255, 0.9),
        0 0 24px 8px rgba(87, 138, 219, 0.9),
        0 0 30px 10px rgba(50, 100, 255, 0.7),
        0 0 70px 25px rgba(0, 50, 255, 0.5),
        0 0 100px 50px rgba(0, 0, 200, 0.3);
    }
  }

  .blow {
    width: 1.8%;
    height: 3.4%;
    position: absolute;
    top: 49.3%;
    left: 55%;
    transform: translate(-50%, -50%);
    z-index: 2;
    border-radius: 50%;
    border: none;
    outline: none;
    background: radial-gradient(circle at 35% 35%,
      #ffffff 0%,
      #66aaff 25%,
      #0033ff 55%,
      #000080 100%
    );

    box-shadow:
      0 0 10px 4px rgba(100, 160, 255, 0.9),
      0 0 30px 10px rgba(50, 100, 255, 0.7),
      0 0 70px 25px rgba(0, 50, 255, 0.5),
      0 0 140px 50px rgba(0, 0, 200, 0.3);

    animation: energyBall 1s ease-in-out infinite;
  }

  @keyframes energyBall {
    0% {
      transform: translate(-50%, -50%) scale(1);
      box-shadow:
        0 0 15px 4px rgba(100, 160, 255, 0.9),
        0 0 24px 8px rgba(87, 138, 219, 0.9),
        0 0 30px 10px rgba(50, 100, 255, 0.7),
        0 0 70px 25px rgba(0, 50, 255, 0.5),
        0 0 100px 50px rgba(0, 0, 200, 0.3);
    }
    50% {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow:
        0 0 80px 36px rgba(150, 200, 255, 1),
        0 0 54px 20px rgba(87, 138, 219, 0.9),
        0 0 70px 18px rgba(80, 140, 255, 0.85),
        0 0 180px 40px rgba(30, 79, 255, 0.511),
        0 0 520px 80px rgba(0, 0, 220, 0.35);
    }
    100% {
      transform: translate(-50%, -50%) scale(1);
      box-shadow:
        0 0 15px 4px rgba(100, 160, 255, 0.9),
        0 0 24px 8px rgba(87, 138, 219, 0.9),
        0 0 30px 10px rgba(50, 100, 255, 0.7),
        0 0 70px 25px rgba(0, 50, 255, 0.5),
        0 0 100px 50px rgba(0, 0, 200, 0.3);
    }
  }

  @media (max-width: 320px) {
    /* Mobile tweaks for very small screens */
    #h1,
    #2h1 {
      left: 50%;
      top: 18%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    #img1 {
      width: 320px !important;
      height: 320px !important;
      top: 56% !important;
      left: 50% !important;
      transform: translate(-50%, -50%);
      position: absolute;
      opacity: 0.65 !important;
    }

    #img2 {
      width: 260px !important;
      height: 260px !important;
      top: 10% !important;
      left: 52% !important;
      transform: translate(-50%, 0%);
    }

    .glow,
    .blow {
      width: 10px !important;
      height: 10px !important;
      top: 72% !important;
      left: 50% !important;
    }
  }


  body{
    background: rgb(0, 0, 0);
    color: white;
    opacity: 0.8;   
    
  }

  img{
    display: none;
  }

  button{
    cursor: pointer;
  }
</style>
        
        <h1 id="h1" style="font-size: 100px; width: 100%; font-family: 'poppins', sans-serif;
         margin: 0; padding:0; text-align: center; position: absolute;
         top: 20%; left: 51.5%; transform: translate(-50%, -50%);

        </h1>
        <h1 id="2h1" style="font-size: 900%; width: 100%; font-family: 'poppins', sans-serif;
         margin: 0; padding:0; text-align: center; position: absolute;
         top: 20%; left: 51.5%; transform: translate(-50%, -50%);
         display: none; z-index: 3; ">
            G  O  K  U
        </h1>
        
        <center>
            <img id="img1" src="goku.jpg" width="750px" height="750px" style="z-index: 3; opacity: 59;">
            <img id="img2" src="https://wallpapercave.com/wp/wp7473480.jpg" width="650px" height="650px"
             style="z-index: 2; opacity: 90; position: absolute; top:11.3%; left: 56.2%; transform: translate(-90%, -0%);">
             
        </center>  
        
        <button class="glow"  ondblclick="gokuuu2()"  onclick="gokuuu1()"></button>
        <!-- <button class="blow" onclick="gokuuu2()"></button> -->
        <script>
            var goku1=document.getElementById("img1");
            var goku2=document.getElementById("img2");
            var h1=document.getElementById("h1");
            var head =document.getElementById("2h1");
            var img1 =document.getElementById("img1");
            var img2 =document.getElementById("img2");
            var body =document.querySelector("body");




            function gokuuu1(){
                goku1.style.opacity ="10"
                goku2.style.opacity ="0.2"
                h1.style.opacity ="100"
                h1.style.display = "block"
                head.style.display = "none"
                img1.style.display = "block"
                img2.style.display = "none"
                body.style.background = "white"
                body.style.color = "black"
            }

            function gokuuu2(){
                goku1.style.opacity ="0.2"
                goku2.style.opacity ="100"
                h1.style.opacity ="0"
                head.style.display = "block"
                h1.style.display = "none"
                img1.style.display = "none"
                img2.style.display = "block"
                body.style.background = "black"
                body.style.color = "white"
            }
        </script>
    </body>
</html>
